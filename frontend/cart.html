<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | FurniQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }
        .cart-items {
            background: var(--bg-white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }
        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
        }
        .item-details {
            flex: 1;
        }
        .item-title {
            font-size: 1.1rem;
            color: var(--secondary-color);
            font-weight: 500;
            margin-bottom: 5px;
        }
        .item-price {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
        }
        .remove-btn {
            color: #e74c3c;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 20px;
        }
        
        /* Order Summary */
        .order-summary {
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            height: fit-content;
        }
        .order-summary h3 {
            margin-bottom: 20px;
            color: var(--secondary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: var(--text-muted);
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--secondary-color);
        }
        .checkout-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        .checkout-btn:hover {
            background: var(--primary-hover);
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Main Header -->
    <header class="main-header" style="border-bottom: 1px solid var(--border-color);">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <h1>FurniQ<span>.</span></h1>
            </a>
            <div class="user-actions">
                <a href="index.html" class="action-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="login.html" class="action-item">
                    <i class="far fa-user"></i>
                    <span>Profile</span>
                </a>
            </div>
        </div>
    </header>

    <main class="section-padding">
        <div class="container">
            <div class="section-header">
                <h2>Shopping Cart</h2>
                <p>Review your items before checkout.</p>
            </div>

            <div class="cart-container" id="cart-container">
                <!-- Cart Items Section -->
                <div class="cart-items" id="cart-items-list">
                    <div style="text-align:center; padding:40px;">
                        <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary-color);"></i>
                        <p style="margin-top:15px;">Loading cart...</p>
                    </div>
                </div>

                <!-- Order Summary Section -->
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span style="color: #27ae60;">Free</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (GST 18%)</span>
                        <span id="tax">₹0</span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span id="total-price">₹0</span>
                    </div>
                    <button class="checkout-btn" onclick="alert('Proceeding to Checkout! (Backend Integration Required)')">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Footer -->
    <footer class="main-footer" style="padding-top: 30px;">
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 FurniQ. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/cart.js"></script>
</body>
</html>
