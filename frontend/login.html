<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FurniQ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 60px auto;
            padding: 40px;
            background: var(--bg-white);
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .auth-container h2 {
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .input-group {
            position: relative;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 1rem;
        }
        .input-group input:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        .auth-btn {
            background: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .auth-btn:hover {
            background: var(--primary-hover);
        }
        .auth-links {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-links a {
            color: var(--primary-color);
            font-weight: 500;
        }
        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>
    <header class="main-header" style="border-bottom: 1px solid var(--border-color);">
        <div class="container header-content" style="justify-content: center;">
            <a href="index.html" class="logo">
                <h1>FurniQ<span>.</span></h1>
            </a>
        </div>
    </header>

    <main class="bg-light" style="min-height: calc(100vh - 100px); padding: 20px;">
        <div class="auth-container">
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Sign in to access your orders, wishlist, and cart.</p>
            
            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div id="errorMsg" class="error-message">Invalid email or password.</div>
                
                <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
            </form>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="#">Sign up here</a></p>
                <p style="margin-top: 10px;"><a href="#">Forgot Password?</a></p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.textContent = 'Signing in...';
            errorMsg.style.display = 'none';

            try {
                // Connect to existing Express backend Auth route
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save JWT token
                    localStorage.setItem('token', data.token);
                    // Redirect to home
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.message || 'Login failed.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Server error. Is the backend running?';
                errorMsg.style.display = 'block';
            } finally {
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
